<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoga Pose Classification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
        }

        h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 20px;
        }

        video {
            border: 2px solid #ccc;
            border-radius: 10px;
            margin-bottom: 20px;
            width: 640px;
            height: 480px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        p {
            font-size: 1.2em;
            color: #555;
            margin-top: 20px;
        }

        #prediction-result {
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <h1>Yoga Pose Classification</h1>
    <video id="video" width="640" height="480" autoplay></video>
    <button id="capture">Capture Pose</button>
    <p id="prediction-result"></p>

    <script src="static/script.js"></script>
</body>
</html>
